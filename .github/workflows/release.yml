name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32
            arch: x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin
            arch: x64
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            server/target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('server/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: Build Rust LSP Server
        working-directory: server
        run: cargo build --release --target ${{ matrix.target }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install VS Code Extension deps
        working-directory: vscode-extension
        run: npm install

      - name: Compile TypeScript
        working-directory: vscode-extension
        run: npx tsc

      - name: Copy binary to extension
        shell: bash
        run: |
          mkdir -p vscode-extension/lsp-bin/${{ matrix.platform }}-${{ matrix.arch }}
          if [ "${{ matrix.platform }}" = "win32" ]; then
            cp server/target/${{ matrix.target }}/release/ai-tab-complete-lsp.exe \
               vscode-extension/lsp-bin/${{ matrix.platform }}-${{ matrix.arch }}/
          else
            cp server/target/${{ matrix.target }}/release/ai-tab-complete-lsp \
               vscode-extension/lsp-bin/${{ matrix.platform }}-${{ matrix.arch }}/
            chmod +x vscode-extension/lsp-bin/${{ matrix.platform }}-${{ matrix.arch }}/ai-tab-complete-lsp
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: extension-${{ matrix.platform }}-${{ matrix.arch }}
          path: vscode-extension/**

  package:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Merge binaries into extension
        run: |
          # 先用 checkout 的源码作为基础
          cd vscode-extension
          npm install
          npx tsc

          # 从各平台 artifact 复制二进制
          for dir in ../arts/*/; do
            platform_dir=$(basename "$dir")
            if [ -d "$dir/lsp-bin" ]; then
              cp -r "$dir/lsp-bin"/* ./lsp-bin/ 2>/dev/null || true
            fi
          done

          # 列出打包内容
          echo "=== LSP Binaries ==="
          find lsp-bin -type f || echo "No binaries found"
          echo "===================="

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Package VSIX
        working-directory: vscode-extension
        run: vsce package --out ../ai-tab-complete.vsix

      - name: Upload VSIX
        uses: actions/upload-artifact@v4
        with:
          name: ai-tab-complete-vsix
          path: ai-tab-complete.vsix

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ai-tab-complete.vsix
          generate_release_notes: true
